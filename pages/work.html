<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Work</title>
  <link rel="stylesheet" href="../styles.css?v=20260702-1800">
</head>
<body class="layout-work">
  <canvas id="scene" aria-hidden="true"></canvas>

  <header class="minimal-header">
    <nav class="minimal-nav" aria-label="Primary navigation">
      <a href="work.html">work</a>
      <a href="view.html#exhibition">exhibition</a>
      <a href="view.html#contact">contact</a>
    </nav>
  </header>

  <main class="work-stage" aria-label="Work roll index">
    <section class="work-roll" id="work-roll" aria-label="Scrollable work list">
      <div class="roll-line roll-line--top" aria-hidden="true">
        <span></span><span></span>
      </div>
      <div class="roll-viewport" id="roll-viewport"></div>
      <div class="roll-line roll-line--bottom" aria-hidden="true">
        <span></span><span></span>
      </div>
    </section>
  </main>

  <script src="../main.js?v=20260702-1800" defer></script>
  <script>
    const rollProjects = [
      { title: 'precarious force', href: 'view.html#precarious-force' },
      { title: 'above the water', href: 'view.html#above-the-water' },
      { title: 'exhibition', href: 'view.html#exhibition' },
      { title: 'nector', href: 'view.html#nector' },
      { title: 'branding', href: 'view.html#branding' },
      { title: 'trees in the plastic boxes', href: 'view.html#trees-in-the-plastic-boxes' },
      { title: 'you can’t step into the same river twice', href: 'view.html#river' },
      { title: '<− ? −>', href: 'view.html#question' }
    ];

    const viewport = document.getElementById('roll-viewport');
    const roll = document.getElementById('work-roll');
    let rollOffset = 0;
    let rollTarget = 0;
    let rollHovered = false;
    let rollOpen = 0;
    let rollOpenTarget = 0;
    let rollItems = [];
    let wheelRemainder = 0;
    let lastWheelAt = 0;
    let lastWheelStepAt = 0;
    let touchpadGestureTimer = 0;
    let touchpadGestureActive = false;
    const WHEEL_STEP_SIZE = 520;
    const WHEEL_EVENT_CAP = 120;
    const WHEEL_STEP_PAUSE = 190;
    const TOUCHPAD_STEP_SIZE = 120;
    const TOUCHPAD_EVENT_CAP = 90;
    const TOUCHPAD_STEP_PAUSE = 54;
    const TOUCHPAD_GESTURE_IDLE = 150;
    const WHEEL_IDLE_RESET = 280;

    function renderRoll() {
      const center = (rollProjects.length - 1) / 2;
      viewport.innerHTML = rollProjects.map((project, index) => (
        `<a class="roll-item" href="${project.href}" data-index="${index}">${project.title}</a>`
      )).join('');
      rollItems = [...viewport.querySelectorAll('.roll-item')];
      viewport.dataset.open = '0';

      updateRoll(0);
    }

    function updateRoll(time) {
      const targetDelta = rollTarget - rollOffset;
      const follow = Math.min(0.34, 0.15 + Math.abs(targetDelta) * 0.055);
      rollOffset += targetDelta * follow;
      rollOpen += (rollOpenTarget - rollOpen) * 0.12;
      viewport.dataset.open = rollOpen.toFixed(3);
      const count = rollItems.length;
      const phase = time * 0.00028;
      const openEase = rollOpen * rollOpen * (3 - 2 * rollOpen);

      rollItems.forEach((item, index) => {
        let relative = index - rollOffset;
        relative = ((relative + count / 2) % count + count) % count - count / 2;
        const curve = Math.tanh(relative * 0.58);
        const y = curve * 138;
        const depth = Math.cos(curve * Math.PI * 0.5);
        const textOpenRaw = Math.max(0, Math.min((openEase - 0.46) / 0.54, 1));
        const textOpen = textOpenRaw * textOpenRaw * (3 - 2 * textOpenRaw);
        const aperture = textOpen * 154;
        const visible = Math.abs(y) < aperture;
        const scaleY = 0.18 + depth * 0.92;
        const scaleX = 0.86 + depth * 0.18;
        const edgeStart = Math.max(0, aperture - 24);
        const edgeFade = Math.max(0, 1 - Math.max(0, Math.abs(y) - edgeStart) / 24);
        const opacity = visible ? Math.max(0, (0.16 + depth * 0.84) * edgeFade * textOpen) : 0;
        const tracking = 0.01 + Math.abs(curve) * 0.1;
        const drift = Math.sin(phase + index * 0.72) * (1.2 + depth * 1.4);
        const z = Math.round(depth * 100);

        item.style.transform = `translate3d(calc(-50% + ${drift}px), calc(-50% + ${y}px), ${z}px) scale(${scaleX}, ${scaleY})`;
        item.style.opacity = opacity.toFixed(3);
        item.style.letterSpacing = `${tracking}em`;
        item.style.zIndex = String(Math.round(depth * 1000));
      });

      requestAnimationFrame(updateRoll);
    }

    roll.addEventListener('mouseenter', () => {
      rollHovered = true;
      rollOpenTarget = 1;
      roll.classList.add('is-open');
    });

    roll.addEventListener('mouseleave', () => {
      rollHovered = false;
      rollOpenTarget = 0;
      roll.classList.remove('is-open');
    });

    roll.addEventListener('wheel', (event) => {
      if (!rollHovered) return;
      event.preventDefault();

      const now = performance.now();
      const modeScale = event.deltaMode === 1 ? 18 : event.deltaMode === 2 ? window.innerHeight : 1;
      const normalizedDelta = event.deltaY * modeScale;
      const isTouchpad = event.deltaMode === 0;

      if (now - lastWheelAt > WHEEL_IDLE_RESET) wheelRemainder = 0;
      lastWheelAt = now;

      if (isTouchpad) {
        const direction = normalizedDelta > 0 ? 1 : -1;
        const cappedDelta = Math.sign(normalizedDelta) * Math.min(Math.abs(normalizedDelta), TOUCHPAD_EVENT_CAP);

        if (!touchpadGestureActive) {
          rollTarget += direction;
          touchpadGestureActive = true;
          lastWheelStepAt = now;
          wheelRemainder = 0;
        } else {
          wheelRemainder += cappedDelta;
          if (Math.abs(wheelRemainder) >= TOUCHPAD_STEP_SIZE && now - lastWheelStepAt >= TOUCHPAD_STEP_PAUSE) {
            const extraSteps = Math.min(4, Math.max(1, Math.floor(Math.abs(wheelRemainder) / TOUCHPAD_STEP_SIZE)));
            rollTarget += direction * extraSteps;
            wheelRemainder -= direction * TOUCHPAD_STEP_SIZE * extraSteps;
            lastWheelStepAt = now;
          }
        }

        window.clearTimeout(touchpadGestureTimer);
        touchpadGestureTimer = window.setTimeout(() => {
          touchpadGestureActive = false;
          wheelRemainder = 0;
        }, TOUCHPAD_GESTURE_IDLE);
        return;
      }

      const cappedDelta = Math.sign(normalizedDelta) * Math.min(Math.abs(normalizedDelta), WHEEL_EVENT_CAP);
      wheelRemainder += cappedDelta;

      if (Math.abs(wheelRemainder) < WHEEL_STEP_SIZE || now - lastWheelStepAt < WHEEL_STEP_PAUSE) return;

      const direction = wheelRemainder > 0 ? 1 : -1;
      rollTarget += direction;
      wheelRemainder -= direction * WHEEL_STEP_SIZE;
      lastWheelStepAt = now;
    }, { passive: false });

    renderRoll();
  </script>
</body>
</html>
