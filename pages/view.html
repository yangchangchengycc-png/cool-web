<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Project</title>
  <link rel="stylesheet" href="../styles.css?v=20260620-2800">
</head>
<body class="layout-detail">
  <canvas id="scene" aria-hidden="true"></canvas>

  <header class="minimal-header">
    <a href="../index.html" class="site-logo" aria-label="L/C. STUDIO">
      <canvas class="site-logo__canvas" id="site-logo-canvas" width="266" height="322" role="img" aria-label="L/C. STUDIO"></canvas>
    </a>
    <nav class="minimal-nav" aria-label="Primary navigation">
      <a href="work.html">work</a>
      <a href="view.html#exhibition">exhibition</a>
      <a href="view.html#contact">contact</a>
    </nav>
  </header>

  <main class="project-page" aria-label="Project detail">
    <div class="project-layout">
      <section class="project-media-col" id="project-viewer">
        <div class="project-viewer">
          <button type="button" class="project-nav project-nav--prev" id="project-nav-prev" aria-label="Previous image">
            <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true"><path d="M1 9L7 1L13 9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>

          <div class="project-stage-wrap">
            <div class="project-stage" id="project-stage"></div>
            <button type="button" class="project-play" id="project-play" aria-label="Play video" hidden>
              <svg width="18" height="22" viewBox="0 0 18 22" aria-hidden="true"><path d="M2 1L16 11L2 21V1Z" fill="currentColor"/></svg>
            </button>
            <button type="button" class="project-expand" id="project-expand" aria-label="Open fullscreen image">
              <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M1 5V1H5M9 1H13V5M13 9V13H9M5 13H1V9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>

          <button type="button" class="project-nav project-nav--next" id="project-nav-next" aria-label="Next image">
            <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true"><path d="M1 1L7 9L13 1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>

        <div class="project-controls">
          <div class="project-title-box" id="project-title-box"></div>
          <button type="button" class="project-tab" data-mode="video">Video</button>
          <button type="button" class="project-tab" data-mode="photo">Photo</button>
        </div>
      </section>

      <aside class="project-info-col" id="project-info">
        <div class="project-rule project-rule--top" aria-hidden="true">
          <span class="project-rule__dash"></span>
        </div>

        <p class="project-statement" id="project-statement"></p>

        <div class="project-rule project-rule--bottom" aria-hidden="true">
          <span class="project-rule__dash"></span>
        </div>

        <div class="project-label">Statement</div>

        <div class="project-meta" id="project-meta"></div>
      </aside>
    </div>
  </main>

  <div class="project-lightbox" id="project-lightbox" hidden aria-hidden="true">
    <button type="button" class="project-lightbox__close" id="project-lightbox-close" aria-label="Close fullscreen">×</button>
    <button type="button" class="project-lightbox__nav project-lightbox__nav--prev" id="project-lightbox-prev" aria-label="Previous image">
      <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true"><path d="M1 9L7 1L13 9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <img class="project-lightbox__image" id="project-lightbox-image" alt="">
    <button type="button" class="project-lightbox__nav project-lightbox__nav--next" id="project-lightbox-next" aria-label="Next image">
      <svg width="14" height="10" viewBox="0 0 14 10" aria-hidden="true"><path d="M1 1L7 9L13 1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </div>

  <script src="../projects.js?v=20260620-2500" defer></script>
  <script src="../logo.js?v=20260702-1900" defer></script>
  <script src="../main.js?v=20260620-2200" defer></script>
  <script src="../project-view.js?v=20260620-2800" defer></script>
</body>
</html>
